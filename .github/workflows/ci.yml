name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.COMETLINE_SUBMODULE_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: comet-sdk/go.mod

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: cometline/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cometline/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: make install

      - name: Run checks
        run: make check

      - name: Run build
        run: make build

  bump-version-and-tag:
    name: Bump version and tag release
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    concurrency:
      group: release-tag-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if commit already tagged
        id: tagged
        run: |
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Commit $(git rev-parse --short HEAD) already has tag $(git describe --exact-match --tags HEAD)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.tagged.outputs.skip != 'true'
        id: version
        run: |
          set -euo pipefail
          LATEST="$(git tag -l 'v*' --sort=-version:refname | head -1)"
          if [ -z "$LATEST" ]; then
            NEXT="v0.0.1"
          else
            VERSION="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            if [ "$PATCH" -gt 999 ]; then
              PATCH=0
              MINOR=$((MINOR + 1))
            fi
            if [ "$MINOR" -gt 999 ]; then
              MINOR=0
              MAJOR=$((MAJOR + 1))
            fi
            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          if git rev-parse "$NEXT" >/dev/null 2>&1; then
            echo "Tag $NEXT already exists"
            exit 1
          fi
          echo "latest=${LATEST:-}" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${LATEST:-<none>}"
          echo "Next tag: $NEXT"

      - name: Create and push release tag
        if: steps.tagged.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.next }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Trigger release workflow
        if: steps.tagged.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.next }}"
          # GITHUB_TOKEN pushes do not emit push events, so release.yml won't
          # start on its own; dispatch it explicitly on the new tag ref.
          gh workflow run "Release macOS" --repo "${GITHUB_REPOSITORY}" --ref "$TAG"
